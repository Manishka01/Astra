<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Dashboard</title>
    <link rel="stylesheet" href="./css/dashboard.css">
</head>

<body>
    <script src="./js/theme.js"></script>

    <div class="dashboard-container">

        <header>
            <h1>ASTRA Dashboard</h1>
            <p>Your Personal Safety Companion</p>
        </header>

        <section class="hero-banner">
            <h2>Welcome Back👋</h2>
            <h4>Your safety system is active and monitoring.</h4>
        </section>

     

        <section class="stats">

            <div class="card">
                <span class="icon">👥</span>
                <h3>Emergency Contacts</h3>
                <p>3</p>
            </div>

            <div class="card">
                <span class="icon">🚨</span>
                <h3>SOS Alerts</h3>
                <p>0</p>
            </div>

            <div class="card">
                <span class="icon">🟢</span>
                <h3>Status</h3>
                <p class="safe">SAFE</p>
            </div>

        </section>

        <section class="actions">

            <h2>Quick Actions</h2>

            <div class="action-buttons">

                <a href="sos.html" class="btn danger">
                    🚨 Trigger SOS
                </a>

                <a href="contacts.html" class="btn">
                    👥 Manage Contacts
                </a>

                <a href="#" class="btn">
                    📜 Alert History
                </a>

                <a href="#" class="btn">
                    ⚙️ Profile Settings
                </a>

            </div>

        </section>

    </div>

    <script src="./js/dashboard.js"></script>

</body>
</html>
